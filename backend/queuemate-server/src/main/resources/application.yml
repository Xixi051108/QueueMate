server:
  port: 8080

spring:
  application:
    name: queuemate-server
  datasource:
    url: jdbc:mysql://localhost:3306/queuemate?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

queuemate:
  jwt:
    issuer: QueueMate
    expire-seconds: 7200
    secret: change-me-to-a-long-random-secret-at-least-32-bytes

