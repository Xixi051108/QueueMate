server:
  port: 8080

spring:
  application:
    name: queuemate-server
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/queuemate?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

queuemate:
  jwt:
    issuer: ${JWT_ISSUER:QueueMate}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes}
